name: build-16k

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) || '' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Android 平台合并 ---
          - platform: android
            os: ubuntu-latest
            arch: universal
            is_android: true
            go_version: '1.25.x'
            flutter_channel: 'stable'

          # --- Windows 平台 ---
          - platform: windows
            os: windows-latest
            arch: amd64
            go_version: '1.25.x'
            flutter_channel: 'stable'
            flutter_version: '3.38.10'
          - platform: windows
            os: windows-latest
            arch: arm64
            go_version: '1.25.x'
            flutter_channel: 'stable'
            flutter_version: '3.38.10'

          # --- macOS 平台 ---
          - platform: macos
            os: macos-latest
            arch: arm64
            go_version: '1.25.x'
            flutter_channel: 'stable'
            flutter_version: '3.38.10'
          - platform: macos
            os: macos-latest
            arch: amd64
            go_version: '1.25.x'
            flutter_channel: 'stable'
            flutter_version: '3.38.10'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Java
        if: matrix.is_android == true
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      - name: Setup NDK
        if: matrix.is_android == true
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b
          add-to-path: true
          link-to-sdk: true

      - name: Setup Rust
        if: matrix.platform == 'windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'x86_64-pc-windows-msvc'

      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go_version }}
          cache-dependency-path: core/go.sum

      - name: Update Go Dependencies
        run: |
          cd core
          go mod tidy

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter_channel }}
          cache: true
          cache-key: flutter-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('**/pubspec.lock') }}
          flutter-version: '3.x'

      - name: Prepare Dependencies
        run: |
          flutter pub get
          dart run build_runner build -d || true

      # 【新增】针对 Android 平台强制升级 Flutter 扫码插件中不符合 16K 标准的闭源依赖
      - name: Force 16K Google Dependencies (CameraX & ML Kit)
        if: matrix.is_android == true
        run: |
          cat <<EOF >> android/build.gradle

          // 强制所有子项目(包括 Flutter 插件)解析更高版本支持 16K 的库
          allprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'androidx.camera:camera-core:1.4.0'
                      force 'androidx.camera:camera-camera2:1.4.0'
                      force 'androidx.camera:camera-lifecycle:1.4.0'
                      force 'androidx.camera:camera-video:1.4.0'
                      force 'androidx.camera:camera-view:1.4.0'
                      force 'com.google.mlkit:barcode-scanning:17.3.0'
                      force 'com.google.android.gms:play-services-mlkit-barcode-scanning:18.3.1'
                  }
              }
          }
          EOF

      # 【新增】针对 Android 平台全局注入 Go 语言的 16K 链接器环境变量
      - name: Inject 16K Page Size for Go (Android)
        if: matrix.is_android == true
        run: echo "CGO_LDFLAGS=-Wl,-z,max-page-size=16384" >> $GITHUB_ENV

      - name: Build Platform
        run: dart setup.dart ${{ matrix.platform }} ${{ matrix.arch && format('--arch {0}', matrix.arch) || '' }}

      - name: Maximize Compression (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location dist
          Get-ChildItem -Filter *.zip | ForEach-Object {
            $f = $_.Name
            Write-Host "Re-compressing $f with max level..."
            $tmpdir = Join-Path $env:TEMP "recompress-$(Get-Random)"
            New-Item -ItemType Directory -Path $tmpdir -Force | Out-Null
            Expand-Archive -Path $f -DestinationPath $tmpdir -Force
            Remove-Item $f -Force
            Compress-Archive -Path "$tmpdir\*" -DestinationPath $f -CompressionLevel Optimal -Force
            Remove-Item $tmpdir -Recurse -Force
          }
          Write-Host "Done. Final sizes:"
          Get-ChildItem | Format-Table Name, Length

      - name: Maximize Compression (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd dist
          for f in *.apk *.zip; do
            if [ -f "$f" ]; then
              echo "Re-compressing $f with max level..."
              tmpdir=$(mktemp -d)
              unzip -q "$f" -d "$tmpdir"
              rm "$f"
              cd "$tmpdir"
              zip -9 -r "$OLDPWD/$f" . -x '*.DS_Store'
              cd "$OLDPWD"
              rm -rf "$tmpdir"
            fi
          done
          for f in *.deb; do
            if [ -f "$f" ]; then
              echo "Re-compressing $f with max level..."
              tmpdir=$(mktemp -d)
              cd "$tmpdir"
              ar x "$OLDPWD/$f"
              for data in data.tar.* control.tar.*; do
                if [ -f "$data" ] && [ "${data##*.}" = "gz" ]; then
                  mv "$data" "$data.tmp"
                  gzip -9 -c "$data.tmp" > "$data"
                  rm "$data.tmp"
                fi
              done
              ar rcs "$OLDPWD/$f" debian-binary control.tar.* data.tar.*
              cd "$OLDPWD"
              rm -rf "$tmpdir"
            fi
          done
          echo "Done. Final sizes:"
          ls -lh

      - name: Sign Android APKs with Fixed Keystore
        if: matrix.is_android == true
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | grep -v "\.bat$" | sort -r | head -n 1)
          
          for apk in ./dist/*.apk; do
            if [ -f "$apk" ]; then
              echo "Applying consistent signature to $apk"
              $APKSIGNER sign --ks release.keystore \
                --ks-pass env:KEYSTORE_PASSWORD \
                --ks-key-alias "$KEY_ALIAS" \
                --key-pass env:KEY_PASSWORD \
                "$apk"
            fi
          done
          rm release.keystore

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: FlClash-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) || '' }}
          path: ./dist
          overwrite: true
          compression-level: 9
